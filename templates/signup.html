<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>


    <div class="main">
        <div class="loginbox">
            <h2 class="text-center mb-4">signup</h2>
            <form action="/perform_registration" method="POST">

                <div class="mb-3">

                    <label class="form-label">Full Name</label>
                    <input name="username" type="text" class="form-control " placeholder="Enter your name">

                </div>

                <div class="mb-3">
                    

                    <label class="form-label">Email</label>
                    <input name="email" type="email" class="form-control " placeholder="Enter your Email">

                </div>

                <div class="mb-3">

                    <label class="form-label">Password</label>
                    <input name="password" type="password" class="form-control " placeholder="Enter your Password">

                </div>

                <div class="mb-3">

                    <label class="form-label">Confirm Password</label>
                    <input name="confirm_password" type="password" class="form-control " placeholder="Confirm your Password">

                </div>

                <button class="btn btn-success w-100">Sign Up</button>

                <p class="text-center">
                    Already have an account?
                    <a href="/"> Login</a>

                </p>

            </form>
        </div>
    </div>

</body>

</html>
