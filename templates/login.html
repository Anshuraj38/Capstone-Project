<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilios – Login</title>
    <meta name="description" content="Sign in to Ilios, the AI-powered data cleaning platform.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="auth-bg">
    <!-- Animated blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="8" fill="#4F8EF7"/>
                    <rect x="6" y="14" width="4" height="8" rx="1" fill="white"/>
                    <rect x="12" y="9" width="4" height="13" rx="1" fill="white" opacity="0.8"/>
                    <rect x="18" y="5" width="4" height="17" rx="1" fill="white" opacity="0.6"/>
                </svg>
            </div>
            <span class="logo-text">Ilios</span>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue to your workspace</p>

        {% if error %}
        <div class="auth-alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" id="loginForm">

            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="auth-input" placeholder="you@example.com" required id="loginEmail">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-icon-wrap">
                    <input type="password" name="password" class="auth-input" placeholder="Enter your password" required id="loginPassword">
                    <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary-auth" id="loginBtn">
                <span>Sign In</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>

        </form>

        <p class="auth-switch">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>

    </div>
</div>
