<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilios | History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body>
    <div class="container mt-5">
    <a href="{{ url_for ('dashboard') }}" class="text-secondary text-decoration-none mb-4 d-inline-block"> &lt; Back to Dashboard</a>
    
    <h2 class="text-white mb-4">View Past Activity</h2>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary h-100 shadow-sm">
                <div class="card-body text-center py-5">
                    <h5 class="card-title">Recent Activity</h5>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary h-100 shadow-sm">
                <div class="card-body text-center py-5">
                    <h5 class="card-title">Download History</h5>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary h-100 shadow-sm">
                <div class="card-body text-center py-5">
                    <h5 class="card-title">Session Duration</h5>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-dark text-white border-secondary h-100 shadow-sm">
                <div class="card-body text-center py-5">
                    <h5 class="card-title">Trash</h5>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
